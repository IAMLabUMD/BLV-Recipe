<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converting Recipe - The Blind Kitchen Recipe Adapter</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav aria-label="Main navigation">
        <a href="index.html" class="navbar-brand">Spoken Spoon</a>
        <ul class="navbar-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="library.html">Library</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="loading-section">
            <h1>Converting Your Recipe</h1>
            <p id="loadingMessage" class="loading-message" aria-live="polite" aria-atomic="true">
                Your recipe is being converted to an accessible format...
            </p>

            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>

            <div id="errorMessage" class="error-message" role="alert" hidden></div>

            <button id="quitButton" class="quit-button">
                Quit and return to home
            </button>
        </section>
    </main>

    <script src="/static/js/loading.js"></script>
</body>
</html>
