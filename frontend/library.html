<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Library - Spoken Spoon</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="/favicon.ico" type="./public/images/SpokenSpoon_logo.png">
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
    />
</head>
<body>
    <nav aria-label="Main navigation">
        <a href="index.html" class="navbar-brand"><img src="./public/images/SpokenSpoon_logo.png" alt="Spoken Spoon logo">Spoken Spoon</a>
        <button
            id="burgerMenuBtn"
            class="burger-menu-btn"
            aria-label="Toggle navigation menu"
            aria-expanded="false"
            aria-controls="navbarMenu"
        >
            <i class="ph ph-list" aria-hidden="true"></i>
        </button>
        <ul class="navbar-links" id="navbarMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="library.html" aria-current="page">Library</a></li>
        </ul>
    </nav>
    <div id="menuBackdrop" class="menu-backdrop" aria-hidden="true"></div>

    <main class="container">
        <section class="library-page-section">
            <header>
                <h1>Recipe Library</h1>
            </header>

            <div class="featured-recipes-section">
                <h2>Featured Recipes</h2>
                <p>Adapted from recipes created by Chef Debra Erickson at The Blind Kitchen.</p>
                <div id="featuredRecipeGrid" class="recipe-grid"></div>
            </div>

            <div class="user-recipes-section">
                <h2>All Recipes</h2>

                <div id="loadingMessage" class="loading-message" role="status" aria-live="polite">
                    Loading recipes...
                </div>

                <div id="emptyState" class="empty-state" hidden>
                    <p>No recipes in the library yet. <a href="index.html">Create your own recipe</a>.</p>
                </div>

                <div id="recipeGrid" class="recipe-grid"></div>
            </div>
        </section>
    </main>

    <script src="./js/burger-menu.js"></script>
    <script src="./js/library.js"></script>
</body>
</html>
